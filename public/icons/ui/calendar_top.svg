<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 50" shape-rendering="crispEdges">
  <defs>
    <g id="binder">
      <!-- Main binder body (inset for rounded edges) -->
      <rect x="2" y="4" width="8" height="28" fill="#555"/>

      <!-- Pixel-rounded top: step out -->
      <rect x="0" y="6" width="2" height="24" fill="#555"/>
      <rect x="10" y="6" width="2" height="24" fill="#555"/>

      <!-- Inner fill -->
      <rect x="2" y="6" width="8" height="24" fill="#666"/>

      <!-- Top cap with rounded corners -->
      <rect x="2" y="4" width="8" height="3" fill="#4a4a4a"/>
      <!-- round top-left pixel -->
      <rect x="0" y="6" width="2" height="1" fill="#4a4a4a"/>
      <!-- round top-right pixel -->
      <rect x="10" y="6" width="2" height="1" fill="#4a4a4a"/>

      <!-- Highlight streak left side -->
      <rect x="2" y="8" width="3" height="16" fill="#888"/>
      <!-- Smaller bright highlight -->
      <rect x="3" y="10" width="2" height="10" fill="#9a9a9a"/>

      <!-- Right shadow edge (follows rounded shape) -->
      <rect x="9" y="6" width="1" height="24" fill="#444"/>
      <rect x="10" y="6" width="2" height="24" fill="#444"/>

      <!-- Pixel-rounded bottom corners -->
      <rect x="2" y="28" width="8" height="2" fill="#3a3a3a"/>
      <rect x="0" y="28" width="2" height="0" fill="#3a3a3a"/>
      <rect x="10" y="28" width="2" height="0" fill="#3a3a3a"/>
    </g>
  </defs>

  <!-- Red bar with pixel-rounded corners -->
  <rect x="4" y="20" width="472" height="28" fill="#cc2a2a"/>

  <!-- Pixel-rounded top-left corner -->
  <rect x="2" y="22" width="2" height="26" fill="#cc2a2a"/>
  <rect x="0" y="24" width="2" height="24" fill="#cc2a2a"/>

  <!-- Pixel-rounded top-right corner -->
  <rect x="476" y="22" width="2" height="26" fill="#cc2a2a"/>
  <rect x="478" y="24" width="2" height="24" fill="#cc2a2a"/>

  <!-- Top edge highlight -->
  <rect x="4" y="20" width="472" height="3" fill="#e03030"/>
  <rect x="2" y="22" width="2" height="1" fill="#e03030"/>
  <rect x="476" y="22" width="2" height="1" fill="#e03030"/>

  <!-- Bottom edge shadow -->
  <rect x="4" y="44" width="472" height="4" fill="#a01e1e"/>
  <rect x="2" y="44" width="2" height="4" fill="#a01e1e"/>
  <rect x="476" y="44" width="2" height="4" fill="#a01e1e"/>
  <rect x="0" y="44" width="2" height="2" fill="#a01e1e"/>
  <rect x="478" y="44" width="2" height="2" fill="#a01e1e"/>

  <!-- Left highlight edge -->
  <rect x="0" y="24" width="2" height="20" fill="#e03030"/>
  <rect x="2" y="22" width="2" height="2" fill="#e03030"/>

  <!-- Right shadow edge -->
  <rect x="478" y="24" width="2" height="20" fill="#a01e1e"/>
  <rect x="476" y="22" width="2" height="2" fill="#a01e1e"/>

  <!-- Inner shadow line -->
  <rect x="4" y="23" width="472" height="1" fill="#b52525" opacity="0.5"/>

  <!-- 15 binders, 32px apart, starting at x=10 -->
  <use href="#binder" x="10"/>
  <use href="#binder" x="42"/>
  <use href="#binder" x="74"/>
  <use href="#binder" x="106"/>
  <use href="#binder" x="138"/>
  <use href="#binder" x="170"/>
  <use href="#binder" x="202"/>
  <use href="#binder" x="234"/>
  <use href="#binder" x="266"/>
  <use href="#binder" x="298"/>
  <use href="#binder" x="330"/>
  <use href="#binder" x="362"/>
  <use href="#binder" x="394"/>
  <use href="#binder" x="426"/>
  <use href="#binder" x="458"/>
</svg>
